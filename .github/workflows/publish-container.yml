name: Publish Container

on:
  push:
    tags:
      - 'v*'

# No top-level packages: write — the GITHUB_TOKEN is not used for registry
# auth. A dedicated GitHub App token (GHCR_APP_ID / GHCR_APP_PRIVATE_KEY) is
# used instead, which is scoped to packages: write only and cannot create
# runners, open PRs, or perform any other org action.
permissions:
  contents: read

jobs:
  # Validate tag/package.json alignment once; both image jobs depend on this.
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      publish_dockerhub: ${{ steps.check.outputs.publish_dockerhub }}
      labels: ${{ steps.check.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Validate tag and resolve shared metadata
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" != v* ]]; then
            echo "Expected a v-prefixed release tag, got '${TAG}'." >&2
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/package mismatch: git tag '${TAG}' != package.json '${EXPECTED_TAG}'." >&2
            exit 1
          fi

          PUBLISH_DOCKERHUB=false
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            PUBLISH_DOCKERHUB=true
          fi

          {
            echo "tag=${TAG}"
            echo "publish_dockerhub=${PUBLISH_DOCKERHUB}"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${TAG}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  # Execution sandbox image — used inside sandboxes for code execution.
  publish-agent:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get GHCR token
        id: ghcr-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.GHCR_APP_ID }}
          private-key: ${{ secrets.GHCR_APP_PRIVATE_KEY }}

      - name: Resolve agent image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PUBLISH_DOCKERHUB: ${{ needs.validate.outputs.publish_dockerhub }}
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/hybridclaw-agent"
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-agent"
          TAGS="${GHCR_IMAGE}:${TAG}"
          if [[ "${TAG}" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"${GHCR_IMAGE}:latest"
          fi
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:${TAG}"
            if [[ "${TAG}" != *-* ]]; then
              TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ steps.ghcr-token.outputs.token }}

      - name: Build and push agent image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./container
          push: true
          # provenance and sbom disabled: multi-platform builds via QEMU emit
          # an extra attestation manifest that confuses some older Docker clients
          # pulling the image. Re-evaluate when dropping linux/arm64 QEMU builds.
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}

  # Gateway image — runs as a permanent claw sandbox (hybridclaw gateway start).
  publish-gateway:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get GHCR token
        id: ghcr-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.GHCR_APP_ID }}
          private-key: ${{ secrets.GHCR_APP_PRIVATE_KEY }}

      - name: Resolve gateway image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PUBLISH_DOCKERHUB: ${{ needs.validate.outputs.publish_dockerhub }}
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/hybridclaw-gateway"
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-gateway"
          TAGS="${GHCR_IMAGE}:${TAG}"
          if [[ "${TAG}" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"${GHCR_IMAGE}:latest"
          fi
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:${TAG}"
            if [[ "${TAG}" != *-* ]]; then
              TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ steps.ghcr-token.outputs.token }}

      - name: Build and push gateway image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # provenance and sbom disabled: see agent job comment above.
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}
