<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HybridClaw Chat</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --panel-bg: #ffffff;
      --line: #ebeff5;
      --text: #1f2937;
      --muted: #8b98ab;
      --brand-blue: #4a6cf7;
      --brand-blue-2: #3657e9;
      --error: #d94848;
      --nav-width: 260px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, ui-sans-serif, -apple-system, BlinkMacSystemFont, Inter, NotoSansHans, sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    .layout {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--nav-width) 1fr;
    }

    .sidebar {
      background: rgb(241, 245, 249);
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid #e3e8f0;
    }

    .sidebar-spacer {
      flex: 1 1 auto;
      min-height: 10px;
    }

    .app-version {
      font-size: 12px;
      line-height: 1.2;
      color: #8b98ab;
      padding: 2px 2px 0;
      user-select: none;
    }

    .sidebar-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 2px 0 6px;
      gap: 8px;
    }

    .brand {
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
    }

    .brand-logo {
      width: 46px;
      max-width: 100%;
      display: block;
      height: auto;
    }

    .sidebar-toggle {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #96a0af;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease;
    }

    .sidebar-toggle:hover {
      color: #6f7a8c;
    }

    .sidebar-toggle svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .new-chat-btn {
      width: 100%;
      border: none;
      padding: 10px 2px;
      font: inherit;
      cursor: pointer;
      background: transparent;
      color: #374151;
      text-align: left;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
    }

    .new-chat-btn:hover {
      color: #111827;
    }

    .new-chat-icon {
      width: auto;
      height: auto;
      display: inline-block;
      font-size: 36px;
      line-height: 1;
      color: #4b5563;
      transform: translateY(-1px);
    }

    .sidebar-session-list-wrap {
      display: grid;
      gap: 8px;
      min-height: 0;
    }

    .sidebar-section-title {
      padding: 4px 2px 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8b98ab;
    }

    .sidebar-nav {
      display: grid;
      gap: 4px;
      min-height: 0;
      overflow-y: auto;
    }

    .sidebar-link {
      width: 100%;
      border: none;
      padding: 10px 12px;
      border-radius: 12px;
      font: inherit;
      background: transparent;
      color: #374151;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
    }

    .sidebar-link:hover {
      background: rgba(255, 255, 255, 0.7);
      color: #111827;
    }

    .sidebar-link.is-active {
      background: #ffffff;
      color: var(--brand-blue);
      box-shadow: 0 2px 8px rgba(50, 80, 140, 0.06);
    }

    .sidebar-link-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      color: currentColor;
      flex: 0 0 auto;
    }

    .sidebar-link-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .chat-session-link {
      text-align: left;
      cursor: pointer;
    }

    .chat-session-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
      flex: 1 1 auto;
    }

    .chat-session-copy .sidebar-link-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-session-meta {
      font-size: 12px;
      color: #8b98ab;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-empty {
      padding: 2px 2px 0;
      font-size: 13px;
      color: #8b98ab;
    }

    .layout.is-sidebar-collapsed {
      grid-template-columns: 84px 1fr;
    }

    .layout.is-sidebar-collapsed .new-chat-label {
      display: none;
    }

    .layout.is-sidebar-collapsed .sidebar-link-label {
      display: none;
    }

    .layout.is-sidebar-collapsed .sidebar-session-list-wrap {
      display: none;
    }

    .layout.is-sidebar-collapsed .new-chat-btn {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .layout.is-sidebar-collapsed .sidebar-link {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .layout.is-sidebar-collapsed .brand-logo {
      width: 44px;
    }

    .chat {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #ffffff;
    }

    .chat-topbar {
      display: flex;
      justify-content: flex-end;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .view-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fafc;
      box-shadow: 0 2px 8px rgba(50, 80, 140, 0.06);
    }

    .view-switch-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      color: #526277;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .view-switch-link:hover {
      color: #111827;
    }

    .view-switch-link.is-active {
      background: #ffffff;
      color: var(--brand-blue);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    .view-switch-link .sidebar-link-icon {
      width: 18px;
      height: 18px;
    }

    .view-switch-link .sidebar-link-icon svg {
      width: 16px;
      height: 16px;
    }

    .chat-body {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .msg {
      max-width: 860px;
      width: fit-content;
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: #1f304d;
      white-space: pre-wrap;
      line-height: 1.45;
      box-shadow: 0 2px 8px rgba(50, 80, 140, 0.06);
    }

    .msg.markdown p {
      margin: 0;
    }

    .msg.markdown p + p {
      margin-top: 10px;
    }

    .msg.markdown h1,
    .msg.markdown h2,
    .msg.markdown h3 {
      margin: 0 0 8px;
      color: #172034;
      line-height: 1.2;
    }

    .msg.markdown h1 { font-size: 21px; }
    .msg.markdown h2 { font-size: 19px; }
    .msg.markdown h3 { font-size: 17px; }

    .msg.markdown ul,
    .msg.markdown ol {
      margin: 0;
      padding-left: 20px;
    }

    .msg.markdown ul + p,
    .msg.markdown ol + p,
    .msg.markdown p + ul,
    .msg.markdown p + ol {
      margin-top: 10px;
    }

    .msg.markdown blockquote {
      margin: 0;
      padding: 0 0 0 10px;
      border-left: 3px solid #d8dfeb;
      color: #4e6285;
    }

    .msg.markdown hr {
      border: none;
      border-top: 1px solid #d8dfeb;
      margin: 8px 0;
    }

    .msg.markdown code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.92em;
      background: #f2f5fa;
      color: #203a63;
      padding: 1px 5px;
      border-radius: 6px;
    }

    .msg.markdown pre {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #dde5f2;
      background: #f7f9fd;
      overflow-x: auto;
    }

    .msg.markdown pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #1f304d;
      display: block;
      line-height: 1.4;
    }

    .msg.markdown .md-table-wrap {
      overflow-x: auto;
    }

    .msg.markdown .md-table-wrap + p,
    .msg.markdown p + .md-table-wrap,
    .msg.markdown .md-table-wrap + .md-table-wrap {
      margin-top: 10px;
    }

    .msg.markdown table {
      width: 100%;
      border-collapse: collapse;
      white-space: normal;
      font-size: 0.96em;
    }

    .msg.markdown th,
    .msg.markdown td {
      padding: 8px 10px;
      border: 1px solid #d8dfeb;
      text-align: left;
      vertical-align: top;
    }

    .msg.markdown th {
      background: #f5f8fd;
      color: #172034;
      font-weight: 700;
    }

    .msg-block {
      max-width: 860px;
      width: fit-content;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .msg-block.user-block {
      margin-left: auto;
      align-items: flex-end;
    }

    .msg-actions {
      display: flex;
      justify-content: flex-start;
      gap: 4px;
    }

    .msg-block.user-block .msg-actions {
      justify-content: flex-end;
    }

    .artifact-list {
      display: grid;
      gap: 10px;
    }

    .artifact-card {
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      background: #fbfcff;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .artifact-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #5f6f88;
    }

    .artifact-name {
      font-size: 14px;
      font-weight: 600;
      color: #223554;
      text-decoration: none;
    }

    .artifact-name:hover {
      text-decoration: underline;
    }

    .artifact-badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef3fb;
      color: #3657e9;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .artifact-preview {
      border: 1px solid #dde5f2;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .artifact-preview img,
    .artifact-preview iframe {
      display: block;
      width: 100%;
      border: 0;
    }

    .artifact-preview iframe {
      min-height: 320px;
      background: #ffffff;
    }

    .msg-action-btn {
      border: none;
      background: transparent;
      color: #8b98ab;
      font-size: 16px;
      line-height: 1;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .msg-action-btn:hover {
      background: #eef3fb;
      color: #4b5563;
    }

    .msg-action-btn.copied {
      color: #3657e9;
      background: #e9efff;
    }

    .msg-action-btn.is-text {
      width: auto;
      min-width: 0;
      height: 36px;
      padding: 0 16px;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      background: #ffffff;
      color: #1f304d;
      font-size: 14px;
      font-weight: 500;
    }

    .msg-action-btn.is-text:hover:not(:disabled) {
      background: #f6f8fc;
      color: #18253d;
    }

    .msg-action-btn.is-primary {
      border-color: #111827;
      background: #111827;
      color: #ffffff;
    }

    .msg-action-btn.is-primary:hover:not(:disabled) {
      background: #1f2937;
      color: #ffffff;
    }

    .msg-action-btn:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .branch-switcher {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 2px;
    }

    .branch-count {
      min-width: 34px;
      font-size: 13px;
      color: #5f6f88;
      text-align: center;
    }

    .msg.user.is-editing {
      background: #ffffff;
      border-color: #dbe4f0;
      color: #18253d;
    }

    .msg-inline-editor {
      width: 100%;
      min-height: 92px;
      padding: 0;
      border: none;
      outline: none;
      resize: vertical;
      background: transparent;
      color: inherit;
      font: inherit;
      line-height: 1.45;
    }

    .msg.user {
      margin-left: auto;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-2));
      border-color: transparent;
      color: #ffffff;
    }

    .msg.assistant {
      background: #ffffff;
    }

    .msg.system {
      background: #f8faff;
      color: #4e6285;
    }

    .msg.thinking {
      min-width: 56px;
      padding: 14px 16px;
    }

    .thinking-dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .thinking-dots span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #8b98ab;
      opacity: 0.25;
      animation: thinking-dot 1.1s infinite ease-in-out;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes thinking-dot {
      0%, 80%, 100% {
        opacity: 0.2;
        transform: translateY(0);
      }
      40% {
        opacity: 0.95;
        transform: translateY(-2px);
      }
    }

    .composer {
      padding: 14px 20px 16px;
    }

    .chat.is-empty .chat-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      gap: 22px;
    }

    .chat.is-empty .messages {
      display: none;
    }

    .empty-greeting {
      display: none;
      margin: 0;
      text-align: center;
      font-size: clamp(30px, 3.6vw, 54px);
      line-height: 1.08;
      font-weight: 620;
      letter-spacing: -0.02em;
      color: #172034;
    }

    .chat.is-empty .empty-greeting {
      display: block;
    }

    .chat.is-empty .composer {
      width: min(860px, 100%);
      border-top: none;
      padding: 0;
      background: transparent;
    }

    /* ── Prompt wrap: always-expanded card ── */
    .prompt-wrap {
      display: flex;
      flex-direction: column;
      padding: 14px 16px 10px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
    }

    .composer-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-top: 8px;
    }

    .composer-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Pending media (attachments) ── */
    .pending-media {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .pending-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d9e2ef;
      background: #f8fbff;
      color: #395071;
      font-size: 13px;
      line-height: 1;
    }

    .pending-chip-name {
      max-width: min(280px, 52vw);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: inherit;
      text-decoration: none;
    }

    .pending-chip-remove {
      border: none;
      background: transparent;
      color: #75839a;
      cursor: pointer;
      padding: 0;
      font: inherit;
      line-height: 1;
    }

    .pending-chip-remove:hover {
      color: #23344e;
    }

    .pending-chip.is-status {
      background: #eef5ff;
      border-color: #cddcf8;
      color: #46607f;
    }

    /* ── Textarea ── */
    .composer textarea {
      width: 100%;
      min-height: 24px;
      max-height: 180px;
      resize: none;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 2px 4px;
      font: inherit;
      font-size: 16px;
      line-height: 24px;
      outline: none;
    }

    /* ── Action buttons ── */
    .composer-action {
      flex-shrink: 0;
      border: none;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      padding: 0;
      background: transparent;
      color: #8e95a4;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .composer-action:disabled {
      cursor: default;
      opacity: 0.45;
    }

    #attach {
      color: #8e95a4;
      font-size: 22px;
      line-height: 1;
    }

    #attach:hover:not(:disabled) {
      background: #f0f4f8;
      color: #5c6b81;
    }

    #send {
      background: #d1d5db;
      color: #ffffff;
    }

    #send:hover:not(:disabled) {
      background: #9ca3af;
    }

    #send.is-stop {
      background: #bf5b4d;
    }

    #send.is-stop:hover:not(:disabled) {
      background: #aa4d40;
    }

    .composer-action svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .error {
      min-height: 20px;
      color: var(--error);
      font-size: 13px;
      padding: 0 20px 14px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #e3e8f0;
      }

      .empty-greeting {
        font-size: clamp(22px, 6.8vw, 34px);
      }
    }

    @media (max-width: 720px) {
      .chat-topbar {
        padding: 14px 16px 12px;
      }

      .view-switch {
        width: 100%;
      }

      .view-switch-link {
        flex: 1 1 0;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <img
            class="brand-logo"
            src="https://hybridai.one/static/hai_logo_free.png"
            alt="HybridAI"
          >
        </div>
        <button
          id="sidebarToggle"
          type="button"
          class="sidebar-toggle"
          aria-label="Toggle sidebar"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Toggle sidebar</title>
            <rect x="3" y="4" width="18" height="16" rx="4"></rect>
            <path d="M12 4v16"></path>
          </svg>
        </button>
      </div>

      <button id="newChat" type="button" class="new-chat-btn">
        <span class="new-chat-icon">+</span>
        <span class="new-chat-label">New Conversation</span>
      </button>
      <section class="sidebar-session-list-wrap" aria-labelledby="recentChatsLabel">
        <div id="recentChatsLabel" class="sidebar-section-title">Recent chats</div>
        <div id="recentSessions" class="sidebar-nav" aria-live="polite"></div>
      </section>
      <div class="sidebar-spacer"></div>
      <div id="appVersion" class="app-version">HybridClaw v...</div>
    </aside>

    <main class="chat">
      <div class="chat-topbar">
        <nav class="view-switch" aria-label="Switch view">
          <a class="view-switch-link is-active" href="/chat" aria-current="page">
            <span class="sidebar-link-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </span>
            <span>Chat</span>
          </a>
          <a class="view-switch-link" href="/agents">
            <span class="sidebar-link-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="2"></rect>
                <rect x="14" y="3" width="7" height="7" rx="2"></rect>
                <rect x="3" y="14" width="7" height="7" rx="2"></rect>
                <rect x="14" y="14" width="7" height="7" rx="2"></rect>
              </svg>
            </span>
            <span>Agents</span>
          </a>
          <a class="view-switch-link" href="/admin">
            <span class="sidebar-link-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 3l7 4v10l-7 4-7-4V7l7-4z"></path>
                <path d="M12 8v8"></path>
                <path d="M8.5 10 12 8l3.5 2"></path>
              </svg>
            </span>
            <span>Admin</span>
          </a>

      <div id="chatBody" class="chat-body">
        <section id="messages" class="messages"></section>
        <h1 class="empty-greeting">Ready to claw through your to-do list? 🦞</h1>
        <div class="composer">

                <span aria-hidden="true">+</span>

  <script>
    const layoutEl = document.querySelector('.layout');
    const chatEl = document.querySelector('.chat');
    const greetingEl = document.querySelector('.empty-greeting');
    const appVersionEl = document.getElementById('appVersion');
    const messageEl = document.getElementById('message');
    const messagesEl = document.getElementById('messages');
    const recentSessionsEl = document.getElementById('recentSessions');
    const errorEl = document.getElementById('error');
    const sendEl = document.getElementById('send');
    const attachEl = document.getElementById('attach');
    const attachmentInputEl = document.getElementById('attachmentInput');
    const pendingMediaEl = document.getElementById('pendingMedia');

    const urlParams = new URLSearchParams(window.location.search);
    const queryToken = urlParams.get('token') || '';
    const MAX_RECENT_SESSIONS = 10;
    const SEND_ICON = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5"></path>
        <path d="m5 12 7-7 7 7"></path>
      </svg>
    `;
    const STOP_ICON = `
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="7" y="7" width="10" height="10" rx="2"></rect>
      </svg>
    `;

    function randomHex(byteCount) {
      const bytes = new Uint8Array(byteCount);
      if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
        window.crypto.getRandomValues(bytes);
      } else {
        for (let index = 0; index < bytes.length; index += 1) {
          bytes[index] = Math.floor(Math.random() * 256);
        }
      }
      return Array.from(bytes, (value) => value.toString(16).padStart(2, '0')).join('');
    }

    function generateWebSessionId() {
      return `agent:main:channel:web:chat:dm:peer:${randomHex(8)}`;
    }

    function generateWebUserId() {
      return `web-user-${randomHex(4)}`;
    }

    function resolveStoredSessionId(raw) {
      const normalized = String(raw || '').trim();
      if (!normalized || normalized === 'web:default' || normalized === 'agent:main:channel:web:chat:dm:peer:default') {
        return generateWebSessionId();
      }
      return normalized;
    }

    function normalizeRecentSession(entry) {
      const sessionId = String(entry?.sessionId || '').trim();
      if (!sessionId) return null;
      const title = String(entry?.title || '').trim() || 'Untitled chat';
      const lastActive = String(entry?.lastActive || '').trim();
      const messageCount = Number(entry?.messageCount);
      return {
        sessionId,
        title,
        lastActive,
        messageCount: Number.isFinite(messageCount) ? messageCount : 0,
      };
    }

    let activeSessionId = resolveStoredSessionId(localStorage.getItem('hybridclaw_session'));
    const activeUserId = localStorage.getItem('hybridclaw_user_id') || generateWebUserId();
    let activeSessionNumber = parseInt(localStorage.getItem('hybridclaw_session_number') || '1', 10);
    if (Number.isNaN(activeSessionNumber) || activeSessionNumber < 1) {
      activeSessionNumber = 1;
    }
    let lastSessionNumber = parseInt(localStorage.getItem('hybridclaw_last_session_number') || String(activeSessionNumber), 10);
    if (Number.isNaN(lastSessionNumber) || lastSessionNumber < activeSessionNumber) {
      lastSessionNumber = activeSessionNumber;
    }
    let recentSessions = [];
    const apiToken = queryToken || localStorage.getItem('hybridclaw_token') || '';
    let pendingMedia = [];
    let pendingUploadCount = 0;
    let activeChatRequest = null;
    let activeEditState = null;
    const messageMetaByBlock = new WeakMap();
    const sessionBranchAnchors = new Map();
    const branchFamilies = new Map();
    if (queryToken) {
      localStorage.setItem('hybridclaw_token', queryToken);
    }
    const introLines = [
      'Ready to claw through your to-do list? 🦞',
      'What should we build, fix, or break first?',
      'Drop your wildest idea, I’ll sharpen it.',
      'Stuck? Let’s turn chaos into a plan.',
      'Tell me the mission and I’ll bring the claws.',
      'Big question or tiny bug, I’m in.',
      'What are we shipping today?',
      'Let’s make something clever in one prompt.',
      'Hit me with your hardest problem.',
      'Brainstorm mode activated. What’s first?',
    ];
    let introIndex = 0;

    function renderIntro() {
      if (greetingEl) {
        greetingEl.textContent = introLines[introIndex];
      }
    }

    function savePrefs() {
      localStorage.setItem('hybridclaw_session', activeSessionId);
      localStorage.setItem('hybridclaw_user_id', activeUserId);
      localStorage.setItem('hybridclaw_session_number', String(activeSessionNumber));
      localStorage.setItem('hybridclaw_last_session_number', String(lastSessionNumber));
      if (apiToken) {
        localStorage.setItem('hybridclaw_token', apiToken);
      }
    }

    function updateWindowTitle() {
      document.title = `HybridClaw - (${activeSessionNumber})`;
    }

    function apiHeaders(contentType = 'application/json') {
      const headers = {};
      if (contentType) {
        headers['Content-Type'] = contentType;
      }
      if (apiToken) {
        headers.Authorization = `Bearer ${apiToken}`;
      }
      return headers;
    }

    function buildPendingMediaSummary(media) {
      if (!Array.isArray(media) || media.length === 0) return '';
      const names = media
        .slice(0, 3)
        .map((item) => String(item?.filename || 'attachment'))
        .join(', ');
      const suffix = media.length > 3 ? `, and ${media.length - 3} more` : '';
      return media.length === 1
        ? `Attached file: ${names}`
        : `Attached files: ${names}${suffix}`;
    }

    function buildOutgoingPreviewText(content, media) {
      const text = String(content || '').trim();
      const attachmentText = buildPendingMediaSummary(media);
      if (!attachmentText) return text;
      return text ? `${text}\n\n${attachmentText}` : attachmentText;
    }

    function cloneMediaList(media) {
      if (!Array.isArray(media) || media.length === 0) return [];
      return media.map((item) => ({ ...item }));
    }

    function normalizeMessageId(value) {
      const id = Number(value);
      return Number.isInteger(id) && id > 0 ? id : null;
    }

    function getMessageMeta(block) {
      return messageMetaByBlock.get(block) || null;
    }

    function setMessageMeta(block, patch) {
      const next = {
        ...(getMessageMeta(block) || {}),
        ...(patch || {}),
      };
      messageMetaByBlock.set(block, next);
      return next;
    }

    function ensureSessionBranchAnchorMap(sessionId) {
      const key = String(sessionId || '').trim();
      let map = sessionBranchAnchors.get(key);
      if (!map) {
        map = new Map();
        sessionBranchAnchors.set(key, map);
      }
      return map;
    }

    function ensureBranchFamily(branchKey) {
      let family = branchFamilies.get(branchKey);
      if (!family) {
        family = {
          sessionIds: [],
          messageIdsBySession: new Map(),
        };
        branchFamilies.set(branchKey, family);
      }
      return family;
    }

    function getBranchKeyForMessage(sessionId, messageId) {
      const normalizedMessageId = normalizeMessageId(messageId);
      if (!sessionId || !normalizedMessageId) return null;
      return ensureSessionBranchAnchorMap(sessionId).get(normalizedMessageId) || null;
    }

    function prepareBranchFamily(sourceSessionId, sourceMessageId, branchSessionId) {
      const normalizedSourceMessageId = normalizeMessageId(sourceMessageId);
      if (!sourceSessionId || !normalizedSourceMessageId || !branchSessionId) {
        return null;
      }
      const sourceAnchors = ensureSessionBranchAnchorMap(sourceSessionId);
      const branchKey =
        sourceAnchors.get(normalizedSourceMessageId) ||
        `branch:${sourceSessionId}:${normalizedSourceMessageId}`;
      sourceAnchors.set(normalizedSourceMessageId, branchKey);

      const family = ensureBranchFamily(branchKey);
      if (!family.sessionIds.includes(sourceSessionId)) {
        family.sessionIds.push(sourceSessionId);
      }
      if (!family.sessionIds.includes(branchSessionId)) {
        family.sessionIds.push(branchSessionId);
      }
      family.messageIdsBySession.set(sourceSessionId, normalizedSourceMessageId);
      return branchKey;
    }

    function registerBranchVariant({
      sourceSessionId,
      sourceMessageId,
      branchSessionId,
      branchMessageId,
    }) {
      const normalizedSourceMessageId = normalizeMessageId(sourceMessageId);
      const normalizedBranchMessageId = normalizeMessageId(branchMessageId);
      if (!sourceSessionId || !normalizedSourceMessageId || !branchSessionId || !normalizedBranchMessageId) {
        return null;
      }
      const branchKey = prepareBranchFamily(
        sourceSessionId,
        normalizedSourceMessageId,
        branchSessionId,
      );
      if (!branchKey) return null;

      const branchAnchors = ensureSessionBranchAnchorMap(branchSessionId);
      branchAnchors.set(normalizedBranchMessageId, branchKey);

      const family = ensureBranchFamily(branchKey);
      family.messageIdsBySession.set(sourceSessionId, normalizedSourceMessageId);
      family.messageIdsBySession.set(branchSessionId, normalizedBranchMessageId);
      return branchKey;
    }

    function hydrateBranchFamilies(families) {
      if (!Array.isArray(families)) return;
      for (const family of families) {
        const anchorSessionId = String(family?.anchorSessionId || '').trim();
        const anchorMessageId = normalizeMessageId(family?.anchorMessageId);
        if (!anchorSessionId || !anchorMessageId) continue;
        const normalizedVariants = Array.isArray(family?.variants)
          ? family.variants
              .map((variant) => ({
                sessionId: String(variant?.sessionId || '').trim(),
                messageId: normalizeMessageId(variant?.messageId),
              }))
              .filter((variant) => variant.sessionId && variant.messageId)
          : [];
        if (normalizedVariants.length < 2) continue;

        const branchKey = `branch:${anchorSessionId}:${anchorMessageId}`;
        const branchFamily = ensureBranchFamily(branchKey);
        branchFamily.sessionIds = normalizedVariants.map((variant) => variant.sessionId);
        branchFamily.messageIdsBySession = new Map();

        for (const variant of normalizedVariants) {
          ensureSessionBranchAnchorMap(variant.sessionId).set(variant.messageId, branchKey);
          branchFamily.messageIdsBySession.set(variant.sessionId, variant.messageId);
        }
      }
    }

    function pruneBranchStateForSession(sessionId) {
      const normalizedSessionId = String(sessionId || '').trim();
      if (!normalizedSessionId) {
        sessionBranchAnchors.clear();
        branchFamilies.clear();
        return;
      }

      const keepBranchKeys = new Set();
      const keepSessionIds = new Set([normalizedSessionId]);
      for (const [branchKey, family] of branchFamilies.entries()) {
        if (!family?.sessionIds?.includes(normalizedSessionId)) continue;
        keepBranchKeys.add(branchKey);
        for (const familySessionId of family.sessionIds) {
          const nextSessionId = String(familySessionId || '').trim();
          if (nextSessionId) {
            keepSessionIds.add(nextSessionId);
          }
        }
      }

      if (keepBranchKeys.size === 0) {
        sessionBranchAnchors.clear();
        branchFamilies.clear();
        return;
      }

      for (const branchKey of Array.from(branchFamilies.keys())) {
        if (!keepBranchKeys.has(branchKey)) {
          branchFamilies.delete(branchKey);
        }
      }
      for (const key of Array.from(sessionBranchAnchors.keys())) {
        if (!keepSessionIds.has(key)) {
          sessionBranchAnchors.delete(key);
        }
      }
    }

    function formatRelativeTime(timestamp) {
      const timeMs =
        typeof timestamp === 'number' && Number.isFinite(timestamp)
          ? timestamp
          : Date.parse(String(timestamp || ''));
      const deltaMs =
        Number.isFinite(timeMs) && timeMs > 0 ? Math.max(0, Date.now() - timeMs) : 0;
      const minuteMs = 60 * 1000;
      const hourMs = 60 * minuteMs;
      const dayMs = 24 * hourMs;
      if (deltaMs < minuteMs) return 'Just now';
      if (deltaMs < hourMs) return `${Math.floor(deltaMs / minuteMs)}m ago`;
      if (deltaMs < dayMs) return `${Math.floor(deltaMs / hourMs)}h ago`;
      return `${Math.floor(deltaMs / dayMs)}d ago`;
    }

    function renderRecentSessions() {
      if (!recentSessionsEl) return;
      recentSessionsEl.innerHTML = '';
      if (recentSessions.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'sidebar-empty';
        empty.textContent = 'No recent chats yet.';
        recentSessionsEl.appendChild(empty);
        return;
      }

      for (const session of recentSessions) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `sidebar-link chat-session-link${session.sessionId === activeSessionId ? ' is-active' : ''}`;

        const copy = document.createElement('span');
        copy.className = 'chat-session-copy';

        const title = document.createElement('span');
        title.className = 'sidebar-link-label';
        title.textContent = session.title || 'Untitled chat';
        copy.appendChild(title);

        const meta = document.createElement('span');
        meta.className = 'chat-session-meta';
        meta.textContent = formatRelativeTime(session.lastActive);
        copy.appendChild(meta);

        button.appendChild(copy);
        button.addEventListener('click', () => {
          void openRecentSession(session.sessionId);
        });
        recentSessionsEl.appendChild(button);
      }
    }

    async function refreshRecentSessions() {
      try {
        const params = new URLSearchParams({
          userId: activeUserId,
          channelId: 'web',
          limit: String(MAX_RECENT_SESSIONS),
        });
        const payload = await requestJson(`/api/chat/recent?${params.toString()}`, {
          method: 'GET',
          headers: apiHeaders(),
        });
        recentSessions = Array.isArray(payload.sessions)
          ? payload.sessions
              .map((entry) => normalizeRecentSession(entry))
              .filter(Boolean)
          : [];
      } catch {
        recentSessions = [];
      }
      renderRecentSessions();
    }

    function autoResizeTextarea() {
      messageEl.style.height = 'auto';
      messageEl.style.height = messageEl.scrollHeight + 'px';
    }

    function updateComposerState() {
      const isRunning = Boolean(activeChatRequest);
      const isStopping = Boolean(activeChatRequest?.stopping);
      const hasContent = messageEl.value.trim().length > 0;
      const hasMedia = pendingMedia.length > 0;
      sendEl.disabled =
        isStopping ||
        (!isRunning && (pendingUploadCount > 0 || (!hasContent && !hasMedia)));
      sendEl.classList.toggle('is-stop', isRunning);
      sendEl.setAttribute(
        'aria-label',
        isRunning ? 'Stop current message' : 'Send message',
      );
      sendEl.title = isRunning ? 'Stop current message' : 'Send message';
      // NOTE: SEND_ICON and STOP_ICON are static trusted SVG constants defined in this file
      sendEl.innerHTML = isRunning ? STOP_ICON : SEND_ICON;  // eslint-disable-line no-unsanitized/property
      attachEl.disabled = pendingUploadCount > 0 || isRunning;
      attachmentInputEl.disabled = pendingUploadCount > 0 || isRunning;
      messageEl.disabled = isRunning;
    }

    function setError(text) {
      errorEl.textContent = text || '';
    }

    function escapeHtml(raw) {
      return String(raw)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sanitizeUrl(rawUrl) {
      const url = String(rawUrl || '').trim();
      if (!url) return '';
      const lowered = url.toLowerCase();
      if (lowered.startsWith('http://') || lowered.startsWith('https://') || lowered.startsWith('mailto:')) {
        return url;
      }
      return '';
    }

    function renderInlineMarkdown(raw) {
      let text = String(raw || '');
      const inlineCode = [];
      const links = [];

      text = text.replace(/`([^`\n]+)`/g, (_match, code) => {
        const idx = inlineCode.push(`<code>${escapeHtml(code)}</code>`) - 1;
        return `@@IC${idx}@@`;
      });

      text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_match, label, href) => {
        const safeHref = sanitizeUrl(href);
        const safeLabel = escapeHtml(label);
        const html = safeHref
          ? `<a href="${escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${safeLabel}</a>`
          : safeLabel;
        const idx = links.push(html) - 1;
        return `@@LK${idx}@@`;
      });

      text = escapeHtml(text);
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      text = text.replace(/_([^_]+)_/g, '<em>$1</em>');

      text = text.replace(/@@LK(\d+)@@/g, (_match, index) => links[Number(index)] || '');
      text = text.replace(/@@IC(\d+)@@/g, (_match, index) => inlineCode[Number(index)] || '');
      return text;
    }

    function splitMarkdownTableRow(line) {
      let value = String(line || '').trim();
      if (value.startsWith('|')) value = value.slice(1);
      if (value.endsWith('|')) value = value.slice(0, -1);
      return value.split('|').map((cell) => cell.trim());
    }

    function isMarkdownTableSeparator(line) {
      const cells = splitMarkdownTableRow(line);
      if (!cells.length) return false;
      return cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function isMarkdownTableBodyRow(line) {
      const trimmed = String(line || '').trim();
      return trimmed.includes('|') && trimmed !== '|' && !isMarkdownTableSeparator(trimmed);
    }

    function cellAlignment(separatorCell) {
      const trimmed = String(separatorCell || '').trim();
      if (trimmed.startsWith(':') && trimmed.endsWith(':')) return 'center';
      if (trimmed.endsWith(':')) return 'right';
      return 'left';
    }

    function renderMarkdownTable(headerLine, separatorLine, bodyLines) {
      const headers = splitMarkdownTableRow(headerLine);
      const separators = splitMarkdownTableRow(separatorLine);
      const alignments = headers.map((_, index) => cellAlignment(separators[index] || '---'));
      const bodyRows = bodyLines.map((line) => splitMarkdownTableRow(line));

      const thead = `<thead><tr>${headers
        .map((cell, index) => `<th style="text-align:${alignments[index]}">${renderInlineMarkdown(cell)}</th>`)
        .join('')}</tr></thead>`;
      const tbody = `<tbody>${bodyRows
        .map((row) => `<tr>${headers
          .map((_, index) => `<td style="text-align:${alignments[index]}">${renderInlineMarkdown(row[index] || '')}</td>`)
          .join('')}</tr>`)
        .join('')}</tbody>`;
      return `<div class="md-table-wrap"><table>${thead}${tbody}</table></div>`;
    }

    function renderMarkdown(raw) {
      let text = String(raw || '').replace(/\r\n/g, '\n');
      const codeBlocks = [];

      text = text.replace(/```([^\n`]*)\n([\s\S]*?)```/g, (_match, _lang, code) => {
        const idx = codeBlocks.push(`<pre><code>${escapeHtml(code.replace(/\n$/, ''))}</code></pre>`) - 1;
        return `@@CB${idx}@@`;
      });

      const lines = text.split('\n');
      const out = [];
      let paragraphLines = [];
      let openList = '';

      const closeList = () => {
        if (openList) {
          out.push(openList === 'ul' ? '</ul>' : '</ol>');
          openList = '';
        }
      };

      const flushParagraph = () => {
        if (paragraphLines.length === 0) return;
        const html = paragraphLines.map((line) => renderInlineMarkdown(line)).join('<br>');
        out.push(`<p>${html}</p>`);
        paragraphLines = [];
      };

      let index = 0;
      while (index < lines.length) {
        const line = lines[index];
        const codeMatch = line.match(/^@@CB(\d+)@@$/);
        if (codeMatch) {
          flushParagraph();
          closeList();
          out.push(codeBlocks[Number(codeMatch[1])] || '');
          index += 1;
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          closeList();
          index += 1;
          continue;
        }

        const nextLine = lines[index + 1] || '';
        if (line.includes('|') && isMarkdownTableSeparator(nextLine)) {
          flushParagraph();
          closeList();
          const bodyLines = [];
          let tableIndex = index + 2;
          while (tableIndex < lines.length && isMarkdownTableBodyRow(lines[tableIndex])) {
            bodyLines.push(lines[tableIndex]);
            tableIndex += 1;
          }
          out.push(renderMarkdownTable(line, nextLine, bodyLines));
          index = tableIndex;
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          closeList();
          const level = heading[1].length;
          out.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
          index += 1;
          continue;
        }

        const quote = line.match(/^>\s?(.*)$/);
        if (quote) {
          flushParagraph();
          closeList();
          out.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
          index += 1;
          continue;
        }

        const hline = line.match(/^\s*((\*\s*){3,}|(-\s*){3,}|(_\s*){3,})\s*$/);
        if (hline) {
          flushParagraph();
          closeList();
          out.push('<hr>');
          index += 1;
          continue;
        }

        const unordered = line.match(/^\s*[-*+]\s+(.*)$/);
        if (unordered) {
          flushParagraph();
          if (openList !== 'ul') {
            closeList();
            out.push('<ul>');
            openList = 'ul';
          }
          out.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
          index += 1;
          continue;
        }

        const ordered = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ordered) {
          flushParagraph();
          if (openList !== 'ol') {
            closeList();
            out.push('<ol>');
            openList = 'ol';
          }
          out.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
          index += 1;
          continue;
        }

        closeList();
        paragraphLines.push(line);
        index += 1;
      }

      flushParagraph();
      closeList();
      return out.join('');
    }

    function copyTextFallback(text) {
      const helper = document.createElement('textarea');
      helper.value = text;
      helper.setAttribute('readonly', '');
      helper.style.position = 'absolute';
      helper.style.left = '-9999px';
      document.body.appendChild(helper);
      helper.select();
      document.execCommand('copy');
      document.body.removeChild(helper);
    }

    async function copyMessage(content, button) {
      const originalLabel = button?.dataset?.label || button?.textContent || '⧉';
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(content);
        } else {
          copyTextFallback(content);
        }
        if (button) {
          button.textContent = '✓';
          button.classList.add('copied');
        }
        window.setTimeout(() => {
          if (!button) return;
          button.textContent = originalLabel;
          button.classList.remove('copied');
        }, 900);
      } catch {
        copyTextFallback(content);
      }
    }

    function setAppVersion(version) {
      if (!appVersionEl) return;
      if (!version) {
        appVersionEl.textContent = 'HybridClaw v...';
        return;
      }
      appVersionEl.textContent = `HybridClaw v.${String(version).replace(/^v/i, '')}`;
    }

    function updateEmptyState() {
      const hasMessages = messagesEl.children.length > 0;
      chatEl.classList.toggle('is-empty', !hasMessages);
    }

    function buildArtifactUrl(filePath) {
      const params = new URLSearchParams({ path: filePath || '' });
      if (apiToken) {
        params.set('token', apiToken);
      }
      return `/api/artifact?${params.toString()}`;
    }

    function renderPendingMedia() {
      pendingMediaEl.innerHTML = '';
      const showPending = pendingMedia.length > 0 || pendingUploadCount > 0;
      pendingMediaEl.hidden = !showPending;

      pendingMedia.forEach((media, index) => {
        const chip = document.createElement('div');
        chip.className = 'pending-chip';

        const name = media.path ? document.createElement('a') : document.createElement('span');
        name.className = 'pending-chip-name';
        name.textContent = media.filename || 'attachment';
        if (media.path) {
          name.href = buildArtifactUrl(media.path);
          name.target = '_blank';
          name.rel = 'noopener noreferrer';
        }
        chip.appendChild(name);

        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'pending-chip-remove';
        remove.setAttribute('aria-label', `Remove ${media.filename || 'attachment'}`);
        remove.textContent = '×';
        remove.addEventListener('click', () => {
          pendingMedia.splice(index, 1);
          renderPendingMedia();
        });
        chip.appendChild(remove);
        pendingMediaEl.appendChild(chip);
      });

      if (pendingUploadCount > 0) {
        const statusChip = document.createElement('div');
        statusChip.className = 'pending-chip is-status';
        statusChip.textContent =
          pendingUploadCount === 1
            ? 'Uploading 1 file...'
            : `Uploading ${pendingUploadCount} files...`;
        pendingMediaEl.appendChild(statusChip);
      }

      updateComposerState();
    }

    function renderArtifactCards(artifacts) {
      if (!Array.isArray(artifacts) || artifacts.length === 0) return null;
      const wrapper = document.createElement('div');
      wrapper.className = 'artifact-list';

      for (const artifact of artifacts) {
        const card = document.createElement('div');
        card.className = 'artifact-card';

        const meta = document.createElement('div');
        meta.className = 'artifact-meta';

        const link = document.createElement('a');
        link.className = 'artifact-name';
        link.href = buildArtifactUrl(artifact.path || '');
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = artifact.filename || 'artifact';
        meta.appendChild(link);

        const badge = document.createElement('span');
        badge.className = 'artifact-badge';
        badge.textContent = String(artifact.mimeType || 'file').split('/').pop();
        meta.appendChild(badge);

        card.appendChild(meta);

        const mimeType = String(artifact.mimeType || '').toLowerCase();
        if (mimeType.startsWith('image/')) {
          const preview = document.createElement('div');
          preview.className = 'artifact-preview';
          const image = document.createElement('img');
          image.src = buildArtifactUrl(artifact.path || '');
          image.alt = artifact.filename || 'artifact preview';
          preview.appendChild(image);
          card.appendChild(preview);
        } else if (mimeType === 'application/pdf') {
          const preview = document.createElement('div');
          preview.className = 'artifact-preview';
          const frame = document.createElement('iframe');
          frame.src = buildArtifactUrl(artifact.path || '');
          frame.title = artifact.filename || 'PDF preview';
          preview.appendChild(frame);
          card.appendChild(preview);
        }

        wrapper.appendChild(card);
      }

      return wrapper;
    }

    function createMessageActionButton({ label, title, ariaLabel, onClick }) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'msg-action-btn';
      button.dataset.label = label;
      button.setAttribute('aria-label', ariaLabel || title);
      button.title = title;
      button.textContent = label;
      button.addEventListener('click', onClick);
      return button;
    }

    function createTextActionButton({
      label,
      title,
      ariaLabel,
      onClick,
      primary = false,
    }) {
      const button = createMessageActionButton({
        label,
        title,
        ariaLabel,
        onClick,
      });
      button.classList.add('is-text');
      if (primary) {
        button.classList.add('is-primary');
      }
      return button;
    }

    function renderBranchSwitcher(actions, meta) {
      const branchKey = meta.branchKey || getBranchKeyForMessage(meta.sessionId, meta.messageId);
      if (!branchKey) return;
      const family = branchFamilies.get(branchKey);
      if (!family || family.sessionIds.length < 2) return;
      const currentIndex = family.sessionIds.indexOf(meta.sessionId);
      if (currentIndex < 0) return;

      const switcher = document.createElement('div');
      switcher.className = 'branch-switcher';

      const previousButton = createMessageActionButton({
        label: '‹',
        title: 'Previous branch',
        ariaLabel: 'Previous branch',
        onClick: () => {
          if (currentIndex <= 0) return;
          void openSessionById(family.sessionIds[currentIndex - 1]);
        },
      });
      previousButton.disabled = currentIndex <= 0;
      switcher.appendChild(previousButton);

      const count = document.createElement('span');
      count.className = 'branch-count';
      count.textContent = `${currentIndex + 1}/${family.sessionIds.length}`;
      switcher.appendChild(count);

      const nextButton = createMessageActionButton({
        label: '›',
        title: 'Next branch',
        ariaLabel: 'Next branch',
        onClick: () => {
          if (currentIndex >= family.sessionIds.length - 1) return;
          void openSessionById(family.sessionIds[currentIndex + 1]);
        },
      });
      nextButton.disabled = currentIndex >= family.sessionIds.length - 1;
      switcher.appendChild(nextButton);

      actions.appendChild(switcher);
    }

    function renderMessageActions(block) {
      const meta = getMessageMeta(block);
      if (!meta?.actionsEl) return;
      const actions = meta.actionsEl;
      actions.innerHTML = '';

      if (meta.role === 'assistant') {
        if (meta.replayRequest) {
          const regenerate = createMessageActionButton({
            label: '↻',
            title: 'Regenerate response',
            ariaLabel: 'Regenerate response',
            onClick: () => {
              if (activeChatRequest) {
                setError('Stop the current run before regenerating a reply.');
                return;
              }
              void submitPrompt(
                meta.replayRequest.content || '',
                meta.replayRequest.media || [],
                {
                  clearComposer: false,
                  clearPendingMedia: false,
                  sessionId: meta.sessionId || activeSessionId,
                },
              );
            },
          });
          actions.appendChild(regenerate);
        }

        const copy = createMessageActionButton({
          label: '⧉',
          title: 'Copy response',
          ariaLabel: 'Copy response',
          onClick: () => {
            void copyMessage(meta.copyText ?? meta.content ?? '', copy);
          },
        });
        actions.appendChild(copy);
        return;
      }

      if (meta.role !== 'user') return;

      if (meta.isEditing) {
        const cancel = createTextActionButton({
          label: 'Cancel',
          title: 'Cancel editing',
          ariaLabel: 'Cancel editing',
          onClick: () => {
            cancelEditingUserMessage(block);
          },
        });
        actions.appendChild(cancel);

        const save = createTextActionButton({
          label: 'Save',
          title: 'Save edited prompt',
          ariaLabel: 'Save edited prompt',
          primary: true,
          onClick: () => {
            void saveEditedUserMessage(block);
          },
        });
        actions.appendChild(save);
        return;
      }

      const edit = createMessageActionButton({
        label: '✎',
        title: 'Edit prompt',
        ariaLabel: 'Edit prompt',
        onClick: () => {
          startEditingUserMessage(block);
        },
      });
      actions.appendChild(edit);

      const copy = createMessageActionButton({
        label: '⧉',
        title: 'Copy prompt',
        ariaLabel: 'Copy prompt',
        onClick: () => {
          void copyMessage(meta.copyText ?? meta.content ?? '', copy);
        },
      });
      actions.appendChild(copy);
      renderBranchSwitcher(actions, meta);
    }

    function addMessage(role, content, artifacts, options = {}) {
      const item = document.createElement('div');
      item.className = `msg ${role}`;
      if (role === 'assistant') {
        item.classList.add('markdown');
        item.innerHTML = renderMarkdown(content || '');
      } else {
        item.textContent = content || '';
      }
      const block = document.createElement('div');
      block.className = 'msg-block';
      if (role === 'user') {
        block.classList.add('user-block');
      }
      block.appendChild(item);

      if (role === 'assistant') {
        const artifactsBlock = renderArtifactCards(artifacts);
        if (artifactsBlock) {
          block.appendChild(artifactsBlock);
        }
      }

      if (role === 'assistant' || role === 'user') {
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        block.appendChild(actions);
        setMessageMeta(block, {
          block,
          itemEl: item,
          actionsEl: actions,
          role,
          sessionId: options.sessionId || activeSessionId,
          messageId: normalizeMessageId(options.messageId),
          content: content || '',
          copyText: options.copyText ?? content ?? '',
          rawContent: options.rawContent ?? content ?? '',
          media: cloneMediaList(options.media),
          replayRequest: options.replayRequest || null,
          branchKey: options.branchKey || null,
          isEditing: false,
        });
        renderMessageActions(block);
      }

      messagesEl.appendChild(block);
      updateEmptyState();
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return {
        block,
        item,
      };
    }

    function addThinkingMessage() {
      const item = document.createElement('div');
      item.className = 'msg assistant thinking';
      const dots = document.createElement('span');
      dots.className = 'thinking-dots';
      for (let i = 0; i < 3; i += 1) {
        dots.appendChild(document.createElement('span'));
      }
      item.appendChild(dots);
      messagesEl.appendChild(item);
      updateEmptyState();
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return item;
    }

    function cancelEditingUserMessage(block) {
      const meta = getMessageMeta(block);
      if (!meta || meta.role !== 'user') return;
      meta.itemEl.classList.remove('is-editing');
      meta.itemEl.textContent = meta.content || '';
      setMessageMeta(block, {
        isEditing: false,
      });
      if (activeEditState?.block === block) {
        activeEditState = null;
      }
      renderMessageActions(block);
    }

    function startEditingUserMessage(block) {
      if (activeChatRequest) {
        setError('Stop the current run before editing a prompt.');
        return;
      }
      const meta = getMessageMeta(block);
      if (!meta || meta.role !== 'user') return;
      if (activeEditState?.block && activeEditState.block !== block) {
        cancelEditingUserMessage(activeEditState.block);
      }
      meta.itemEl.classList.add('is-editing');
      meta.itemEl.textContent = '';
      const editor = document.createElement('textarea');
      editor.className = 'msg-inline-editor';
      editor.value = meta.rawContent || '';
      editor.setAttribute('aria-label', 'Edit prompt');
      meta.itemEl.appendChild(editor);
      setMessageMeta(block, {
        isEditing: true,
      });
      activeEditState = { block };
      renderMessageActions(block);
      editor.focus();
      editor.setSelectionRange(editor.value.length, editor.value.length);
    }

    async function createPromptBranch(sessionId, beforeMessageId) {
      return requestJson('/api/chat/branch', {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({
          sessionId,
          beforeMessageId,
        }),
      });
    }

    async function saveEditedUserMessage(block) {
      const meta = getMessageMeta(block);
      if (!meta || meta.role !== 'user') return;
      if (activeChatRequest) {
        setError('Stop the current run before editing a prompt.');
        return;
      }
      const editor = meta.itemEl.querySelector('.msg-inline-editor');
      const nextContent = String(editor?.value || '').trim();
      const queuedMedia = cloneMediaList(meta.media);
      if (!nextContent && queuedMedia.length === 0) {
        setError('Edited prompt cannot be empty.');
        return;
      }
      if (!meta.sessionId || !meta.messageId) {
        setError('Reload this chat before editing that prompt.');
        return;
      }
      if (nextContent === String(meta.rawContent || '').trim()) {
        cancelEditingUserMessage(block);
        return;
      }

      const sourceSessionId = meta.sessionId;
      const sourceMessageId = meta.messageId;

      try {
        setError('');
        const branch = await createPromptBranch(sourceSessionId, sourceMessageId);
        const nextSessionId = String(branch?.sessionId || '').trim();
        if (!nextSessionId) {
          throw new Error('Branch response did not include a sessionId.');
        }
        const branchKey = prepareBranchFamily(
          sourceSessionId,
          sourceMessageId,
          nextSessionId,
        );
        activeEditState = null;
        activeSessionId = nextSessionId;
        savePrefs();
        messagesEl.innerHTML = '';
        updateEmptyState();
        await loadHistory();
        const result = await submitPrompt(nextContent, queuedMedia, {
          sessionId: activeSessionId,
          clearComposer: false,
          clearPendingMedia: false,
          branchKey,
        });
        if (result?.userMessageId) {
          registerBranchVariant({
            sourceSessionId,
            sourceMessageId,
            branchSessionId: result.sessionId,
            branchMessageId: result.userMessageId,
          });
          renderMessageActions(result.userBlock);
        }
        void refreshRecentSessions();
      } catch (err) {
        const text = err instanceof Error ? err.message : String(err);
        setError(text);
      }
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `${response.status} ${response.statusText}`);
      }
      return payload;
    }

    function buildClipboardUploadFilename(file) {
      const existingName = String(file?.name || '').trim();
      if (existingName) return existingName;

      const mimeType = String(file?.type || '').trim().toLowerCase();
      const extensionMap = {
        'application/pdf': '.pdf',
        'image/gif': '.gif',
        'image/jpeg': '.jpg',
        'image/png': '.png',
        'image/webp': '.webp',
        'text/plain': '.txt',
      };
      const extension = extensionMap[mimeType] || '';
      return `clipboard${extension}`;
    }

    function normalizeUploadFile(file) {
      if (!(file instanceof File)) return null;
      const filename = buildClipboardUploadFilename(file);
      if (file.name === filename) return file;
      return new File([file], filename, {
        type: file.type || 'application/octet-stream',
        lastModified: Number.isFinite(file.lastModified) ? file.lastModified : Date.now(),
      });
    }

    function extractClipboardFiles(clipboardData) {
      if (!clipboardData) return [];

      const files = [];
      const directFiles = Array.from(clipboardData.files || []);
      for (const file of directFiles) {
        const normalized = normalizeUploadFile(file);
        if (normalized) files.push(normalized);
      }
      if (files.length > 0) {
        return files;
      }

      const seen = new Set();
      for (const item of Array.from(clipboardData.items || [])) {
        if (item.kind !== 'file') continue;
        const file = item.getAsFile();
        const normalized = normalizeUploadFile(file);
        if (!normalized) continue;
        const dedupeKey = `${normalized.name}:${normalized.size}:${normalized.type}:${normalized.lastModified}`;
        if (seen.has(dedupeKey)) continue;
        seen.add(dedupeKey);
        files.push(normalized);
      }
      return files;
    }

    async function uploadSelectedFiles(fileList) {
      const files = Array.from(fileList || []).filter(Boolean);
      if (files.length === 0) return;

      pendingUploadCount += files.length;
      renderPendingMedia();
      setError('');

      const uploaded = [];
      const errors = [];

      for (const file of files) {
        try {
          const payload = await requestJson('/api/media/upload', {
            method: 'POST',
            headers: {
              ...apiHeaders(file.type || 'application/octet-stream'),
              'X-Hybridclaw-Filename': encodeURIComponent(file.name || 'upload'),
            },
            body: file,
          });
          if (payload?.media) {
            uploaded.push(payload.media);
          }
        } catch (err) {
          const detail = err instanceof Error ? err.message : String(err);
          errors.push(`${file.name || 'upload'}: ${detail}`);
        }
      }

      pendingUploadCount = Math.max(0, pendingUploadCount - files.length);
      if (uploaded.length > 0) {
        pendingMedia.push(...uploaded);
      }
      renderPendingMedia();
      if (errors.length > 0) {
        setError(errors.join(' '));
      }
      attachmentInputEl.value = '';
    }

    async function loadHistory() {
      activeEditState = null;
      savePrefs();
      setError('');
      pruneBranchStateForSession(activeSessionId);
      messagesEl.innerHTML = '';
      updateEmptyState();
      try {
        const sessionId = encodeURIComponent(activeSessionId);
        const payload = await requestJson(`/api/history?sessionId=${sessionId}&limit=80`, {
          method: 'GET',
          headers: apiHeaders(),
        });
        if (payload.sessionId) {
          const nextSessionId = String(payload.sessionId);
          activeSessionId = nextSessionId;
          savePrefs();
        }
        hydrateBranchFamilies(payload.branchFamilies);
        let lastUserPrompt = null;
        for (const msg of payload.history || []) {
          const role = String(msg.role || '');
          const content = msg.content || '';
          const messageId = normalizeMessageId(msg.id);
          if (role === 'user') {
            lastUserPrompt = {
              content,
              media: [],
            };
            addMessage(role, content, undefined, {
              sessionId: activeSessionId,
              messageId,
              copyText: content,
              rawContent: content,
              media: [],
            });
            continue;
          }
          if (role === 'assistant') {
            addMessage(role, content, undefined, {
              sessionId: activeSessionId,
              messageId,
              replayRequest: lastUserPrompt,
            });
            continue;
          }
          addMessage(role, content);
        }
        renderRecentSessions();
      } catch (err) {
        setError(err instanceof Error ? err.message : String(err));
      }
    }

    async function loadStatus() {
      try {
        const payload = await requestJson('/api/status', {
          method: 'GET',
          headers: apiHeaders(),
        });
        setAppVersion(payload.version || '');
      } catch {
        setAppVersion('');
      }
    }

    async function submitPrompt(rawContent, media, options = {}) {
      if (activeChatRequest) return;
      if (activeEditState?.block) {
        cancelEditingUserMessage(activeEditState.block);
      }
      const targetSessionId = String(options.sessionId || activeSessionId || '').trim();
      const content = String(rawContent || '').trim();
      const queuedMedia = cloneMediaList(media);
      if (!content && queuedMedia.length === 0) return;
      const previewText = buildOutgoingPreviewText(content, queuedMedia);

      savePrefs();
      setError('');
      const userView = addMessage('user', previewText, undefined, {
        sessionId: targetSessionId,
        copyText: previewText,
        rawContent: content,
        media: queuedMedia,
        branchKey: options.branchKey || null,
      });
      if (options.clearComposer !== false) {
        messageEl.value = '';
      }
      if (options.clearPendingMedia !== false) {
        pendingMedia = [];
        renderPendingMedia();
      }
      const thinkingItem = addThinkingMessage();
      const requestState = {
        controller: new AbortController(),
        sessionId: targetSessionId,
        thinkingItem,
        queuedMedia,
        userBlock: userView?.block || null,
        stopRequested: false,
        stopping: false,
      };
      activeChatRequest = requestState;
      updateComposerState();

      try {
        const payload = await requestJson('/api/chat', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify({
            sessionId: requestState.sessionId,
            channelId: 'web',
            userId: activeUserId,
            username: 'web',
            content,
            ...(queuedMedia.length > 0 ? { media: queuedMedia } : {}),
          }),
          signal: requestState.controller.signal,
        });
        if (payload.status === 'error') {
          throw new Error(payload.error || 'Unknown error');
        }
        if (payload.sessionId) {
          activeSessionId = String(payload.sessionId);
          savePrefs();
        }
        const userMessageId = normalizeMessageId(payload.userMessageId);
        if (requestState.userBlock) {
          setMessageMeta(requestState.userBlock, {
            sessionId: activeSessionId,
            messageId: userMessageId,
          });
          renderMessageActions(requestState.userBlock);
        }
        const assistantView = addMessage('assistant', payload.result || '', payload.artifacts || [], {
          sessionId: activeSessionId,
          messageId: normalizeMessageId(payload.assistantMessageId),
          replayRequest: {
            content,
            media: queuedMedia,
          },
        });
        void refreshRecentSessions();
        return {
          payload,
          sessionId: activeSessionId,
          userMessageId,
          assistantMessageId: normalizeMessageId(payload.assistantMessageId),
          userBlock: requestState.userBlock,
          assistantBlock: assistantView?.block || null,
        };
      } catch (err) {
        if (requestState.stopRequested) {
          setError('');
          return null;
        }
        const text = err instanceof Error ? err.message : String(err);
        if (options.clearPendingMedia !== false) {
          pendingMedia = [...queuedMedia, ...pendingMedia];
          renderPendingMedia();
        }
        setError(text);
        addMessage('system', `Error: ${text}`);
      } finally {
        if (requestState.thinkingItem?.isConnected) {
          requestState.thinkingItem.remove();
        }
        if (activeChatRequest === requestState) {
          activeChatRequest = null;
        }
        updateComposerState();
      }

      return null;
    }

    async function sendMessage() {
      if (pendingUploadCount > 0) return;
      await submitPrompt(messageEl.value, pendingMedia);
    }

    async function stopActiveChatRequest() {
      const requestState = activeChatRequest;
      if (!requestState || requestState.stopping) return;

      requestState.stopRequested = true;
      requestState.stopping = true;
      setError('');
      updateComposerState();

      try {
        await requestJson('/api/command', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify({
            sessionId: requestState.sessionId,
            guildId: null,
            channelId: 'web',
            userId: activeUserId,
            username: 'web',
            args: ['stop'],
          }),
        });
        requestState.controller.abort();
      } catch (err) {
        requestState.stopRequested = false;
        requestState.stopping = false;
        const text = err instanceof Error ? err.message : String(err);
        setError(`Failed to stop current run: ${text}`);
        updateComposerState();
      }
    }

    async function openSessionById(sessionId) {
      if (activeChatRequest) {
        setError('Stop the current run before switching chats.');
        return;
      }
      if (activeEditState?.block) {
        cancelEditingUserMessage(activeEditState.block);
      }
      activeSessionId = String(sessionId || '').trim();
      if (!activeSessionId) return;
      pruneBranchStateForSession(activeSessionId);
      messageEl.value = '';
      messagesEl.innerHTML = '';
      pendingMedia = [];
      pendingUploadCount = 0;
      renderPendingMedia();
      updateEmptyState();
      updateWindowTitle();
      savePrefs();
      renderRecentSessions();
      setError('');
      await loadHistory();
      messageEl.focus();
    }

    function newChat() {
      if (activeChatRequest) {
        setError('Stop the current run before starting a new chat.');
        return;
      }
      if (activeEditState?.block) {
        cancelEditingUserMessage(activeEditState.block);
      }
      lastSessionNumber += 1;
      activeSessionNumber = lastSessionNumber;
      activeSessionId = generateWebSessionId();
      pruneBranchStateForSession(null);
      messageEl.value = '';
      messagesEl.innerHTML = '';
      pendingMedia = [];
      pendingUploadCount = 0;
      renderPendingMedia();
      updateEmptyState();
      updateWindowTitle();
      savePrefs();
      renderRecentSessions();
      setError('');
      messageEl.focus();
    }

    async function openRecentSession(sessionId) {
      const target = recentSessions.find((session) => session.sessionId === sessionId);
      if (!target && !sessionId) return;
      await openSessionById(target?.sessionId || sessionId);
    }

    sendEl.addEventListener('click', () => {
      if (activeChatRequest) {
        void stopActiveChatRequest();
        return;
      }
      void sendMessage();
    });
    attachEl.addEventListener('click', () => {
      attachmentInputEl.click();
    });
    attachmentInputEl.addEventListener('change', () => {
      void uploadSelectedFiles(attachmentInputEl.files);
    });
    document.getElementById('newChat').addEventListener('click', newChat);
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      layoutEl.classList.toggle('is-sidebar-collapsed');
    });
    messageEl.addEventListener('input', () => {
      autoResizeTextarea();
      updateComposerState();
    });
    messageEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        if (activeChatRequest) return;
        void sendMessage();
      }
    });
    messageEl.addEventListener('paste', (event) => {
      const pastedFiles = extractClipboardFiles(event.clipboardData);
      if (pastedFiles.length === 0) return;
      event.preventDefault();
      void uploadSelectedFiles(pastedFiles);
    });
    introIndex = Math.floor(Math.random() * introLines.length);
    renderIntro();
    renderRecentSessions();
    renderPendingMedia();
    updateEmptyState();
    updateWindowTitle();
    savePrefs();
    void loadStatus();
    void refreshRecentSessions();
    void loadHistory();
  </script>
</body>
</html>
